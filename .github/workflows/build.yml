name: Build (macOS + Windows)

# Exports the game AND packages installable artifacts on every push to main
# (and on demand): a macOS .dmg and a Windows installer, each bundling the
# frozen BLE sensor bridge (PyInstaller, Python 3.14) so end users need
# neither Python nor uv. Each platform builds natively on its own runner.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"

jobs:
  export:
    name: Package ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: "macOS"
            out: build/macos/GottaBikeFast.app
            artifact: GottaBikeFast-macos
          - os: windows-latest
            preset: "Windows Desktop"
            out: build/windows/GottaBikeFast.exe
            artifact: GottaBikeFast-windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # --- Freeze the BLE sensor bridge into a standalone binary ---
      - name: Set up uv + Python 3.14
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"

      - name: Freeze the BLE bridge (PyInstaller)
        working-directory: bridge
        run: |
          set -euo pipefail
          uv sync --group build
          uv run --group build pyinstaller gbf-bridge.spec --noconfirm
          ls -la dist

      # --- Export the game with Godot ---
      - name: Install Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -euo pipefail
          V="${GODOT_VERSION}"
          base="https://github.com/godotengine/godot/releases/download/${V}-stable"

          # zip extractor that works on both runners (git-bash tar can't do zip).
          extract() { # <zipfile> [destdir]
            if [ "${RUNNER_OS}" = "Windows" ]; then
              7z x -y -o"${2:-.}" "$1" >/dev/null
            else
              if [ -n "${2:-}" ]; then unzip -q "$1" -d "$2"; else unzip -q "$1"; fi
            fi
          }

          curl -fL --retry 5 -o templates.tpz "${base}/Godot_v${V}-stable_export_templates.tpz"
          extract templates.tpz _tpl

          if [ "${RUNNER_OS}" = "macOS" ]; then
            curl -fL --retry 5 -o godot.zip "${base}/Godot_v${V}-stable_macos.universal.zip"
            extract godot.zip
            xattr -dr com.apple.quarantine Godot.app || true
            echo "GODOT=$PWD/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
            tpl="$HOME/Library/Application Support/Godot/export_templates/${V}.stable"
          else
            curl -fL --retry 5 -o godot.zip "${base}/Godot_v${V}-stable_win64.exe.zip"
            extract godot.zip
            echo "GODOT=$PWD/Godot_v${V}-stable_win64.exe" >> "$GITHUB_ENV"
            tpl="$(cygpath -u "$APPDATA")/Godot/export_templates/${V}.stable"
          fi
          mkdir -p "$tpl"
          cp -R _tpl/templates/. "$tpl/"
          echo "Installed templates -> $tpl"

      - name: Import project
        run: |
          # First import populates .godot/ (may exit non-zero); second is clean.
          "$GODOT" --headless --import . 2>&1 | tail -n 20 || true
          "$GODOT" --headless --import . 2>&1 | tail -n 5  || true

      - name: Export "${{ matrix.preset }}"
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ matrix.out }}")"
          rm -rf "${{ matrix.out }}"
          "$GODOT" --headless --export-release "${{ matrix.preset }}" "$PWD/${{ matrix.out }}"
          test -e "${{ matrix.out }}" || { echo "::error::export produced no output for ${{ matrix.preset }}"; exit 1; }

      # --- Bundle the bridge + build installable packages ---
      - name: Bundle bridge + build .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          APP="build/macos/GottaBikeFast.app"
          # Apple Silicon only: thin the universal engine binary to arm64.
          # Official Godot templates ship a universal binary (no per-arch
          # slice), so we export universal and drop the Intel slice here.
          BIN="$(ls "$APP/Contents/MacOS/"* | head -1)"
          if lipo -archs "$BIN" | grep -q x86_64; then
            lipo "$BIN" -thin arm64 -output "$BIN.arm64"
            mv "$BIN.arm64" "$BIN"
          fi
          # Embed the frozen bridge inside the app bundle.
          mkdir -p "$APP/Contents/Resources/bridge"
          cp bridge/dist/gbf-bridge "$APP/Contents/Resources/bridge/gbf-bridge"
          chmod +x "$APP/Contents/Resources/bridge/gbf-bridge"
          # Declare Bluetooth usage so CoreBluetooth prompts (instead of
          # silently failing) when the bridge accesses BLE.
          PLIST="$APP/Contents/Info.plist"
          DESC="Gotta Bike Fast reads BLE cycling sensors (power, heart rate, trainer)."
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string \"$DESC\"" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription \"$DESC\"" "$PLIST"
          # We modified the bundle after Godot signed it — re-sign ad-hoc so
          # the embedded bridge is covered by the signature.
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP" || true
          # Build the .dmg (drag-to-Applications install).
          mkdir -p dist_pkg
          hdiutil create -volname "Gotta Bike Fast" -srcfolder "$APP" \
            -ov -format UDZO dist_pkg/GottaBikeFast.dmg
          ls -la dist_pkg

      - name: Bundle bridge + portable zip (Windows)
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist_pkg/app
          cp build/windows/GottaBikeFast.exe dist_pkg/app/GottaBikeFast.exe
          cp bridge/dist/gbf-bridge.exe dist_pkg/app/gbf-bridge.exe
          # Portable zip (unzip and run) — always works as a fallback.
          (cd dist_pkg && 7z a -tzip GottaBikeFast-windows-portable.zip ./app/* >/dev/null)
          ls -la dist_pkg

      - name: Build installer (Inno Setup, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss
          Get-ChildItem dist_pkg

      # --- Upload installable artifacts ---
      - name: Upload macOS installer (.dmg)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist_pkg/GottaBikeFast.dmg
          if-no-files-found: error

      - name: Upload Windows installer + portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist_pkg/GottaBikeFast-Setup.exe
            dist_pkg/GottaBikeFast-windows-portable.zip
          if-no-files-found: error
