<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="shineB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bgB)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#shineB)"/>

  <!-- motion streaks -->
  <g fill="#ffffff" opacity="0.85">
    <rect x="70"  y="356" width="300" height="30" rx="15" opacity="0.85"/>
    <rect x="70"  y="430" width="220" height="30" rx="15" opacity="0.55"/>
    <rect x="70"  y="700" width="250" height="30" rx="15" opacity="0.55"/>
  </g>

  <!-- bike -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="322" cy="700" r="138" stroke-width="24"/>
    <circle cx="726" cy="700" r="138" stroke-width="24"/>
    <g stroke-width="22">
      <!-- chainstay, seat tube, top tube, down tube, fork, seatstay -->
      <path d="M322 700 L512 700"/>
      <path d="M512 700 L460 556"/>
      <path d="M460 556 L656 556"/>
      <path d="M512 700 L656 556"/>
      <path d="M656 556 L726 700"/>
      <path d="M322 700 L460 556"/>
    </g>
  </g>

  <!-- rider (aero tuck) -->
  <g fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <!-- back -->
    <path d="M452 556 L628 512"/>
    <!-- arm to bar -->
    <path d="M628 512 L654 556"/>
    <!-- thigh + shin to pedal -->
    <path d="M452 556 L516 636 L512 700"/>
  </g>
  <!-- head + aero helmet -->
  <g fill="#ffffff">
    <ellipse cx="694" cy="494" rx="44" ry="38"/>
    <path d="M648 480 L712 460 L712 504 Z"/>
  </g>
</svg>
