<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>

  <!-- motion streaks -->
  <g fill="#ffffff">
    <rect x="96"  y="470" width="372" height="38" rx="19" opacity="0.92"/>
    <rect x="150" y="540" width="300" height="38" rx="19" opacity="0.62"/>
    <rect x="196" y="610" width="232" height="38" rx="19" opacity="0.42"/>
  </g>

  <!-- wheel -->
  <g transform="translate(600,512)">
    <circle r="300" fill="none" stroke="#ffffff" stroke-width="58"/>
    <circle r="248" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.55"/>
    <g stroke="#ffffff" stroke-width="16" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-244"/>
      <line x1="0" y1="0" x2="173" y2="-173"/>
      <line x1="0" y1="0" x2="244" y2="0"/>
      <line x1="0" y1="0" x2="173" y2="173"/>
      <line x1="0" y1="0" x2="0" y2="244"/>
      <line x1="0" y1="0" x2="-173" y2="173"/>
      <line x1="0" y1="0" x2="-244" y2="0"/>
      <line x1="0" y1="0" x2="-173" y2="-173"/>
    </g>
    <circle r="54" fill="#ffffff"/>
    <circle r="23" fill="#1d4ed8"/>
  </g>
</svg>
